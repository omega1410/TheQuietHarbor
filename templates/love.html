<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прослушай одна</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdf8f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            background-image: radial-gradient(ellipse at 50% 50%, rgba(193, 102, 91, 0.08) 0%, transparent 70%);
        }

        .container {
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-weight: normal;
            color: #c1665b;
            font-size: 2rem;
            margin-bottom: 2rem;
            letter-spacing: 0.08em;
            animation: fadeInUp 1.2s ease forwards;
        }

        .subtitle {
            color: #8b7e74;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            animation: fadeInUp 1.2s ease 0.3s forwards;
            opacity: 0;
        }

        audio {
            width: 100%;
            margin: 1.5rem 0;
            border-radius: 20px;
            animation: fadeInUp 1.2s ease 0.6s forwards;
            opacity: 0;
        }

        audio::-webkit-media-controls-panel {
            background-color: #fdf8f3;
        }

        .hint {
            color: #8b7e74;
            font-size: 0.85rem;
            font-style: italic;
            animation: fadeInUp 1.2s ease 0.9s forwards;
            opacity: 0;
        }

        .password-form {
            animation: fadeInUp 1s ease forwards;
        }

        .password-form input {
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #e0dcd5;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
            text-align: center;
            outline: none;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.7);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .password-form input:focus {
            border-color: #c1665b;
            box-shadow: 0 0 0 4px rgba(193, 102, 91, 0.1);
        }

        .password-form button {
            padding: 0.8rem 2.5rem;
            border: none;
            border-radius: 50px;
            background: #c1665b;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .password-form button:hover {
            background: #a8554d;
            transform: scale(1.03);
        }

        .password-form button:active {
            transform: scale(0.97);
        }

        .error {
            color: #c1665b;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            animation: shake 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        {% if unlocked %}
        <h1>Прослушай одна</h1>
        <audio controls src="{{ url_for('static', filename='audio/message.mp3') }}"></audio>
        </audio>
        {% else %}
        <h1>Введи пароль</h1>
        <form method="POST" class="password-form">
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
            <input type="password" name="password" placeholder="Пароль" required autofocus>
            <button type="submit">Открыть</button>
        </form>
        {% endif %}
    </div>
</body>

</html>
